services:
  # Backend Service
  - type: web
    name: codememory-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 8000
      - key: MONGO_URI
        value: "mongodb+srv://ramnot69_db_user:YAqAegM6gF1vurFx@cluster0.rtnkmim.mongodb.net/codeMemory"
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: codememory-frontend
    env: static
    buildCommand: cd frontend/frontend && npm install && npm run build
    publishPath: frontend/frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codememory-backend
          property: url
