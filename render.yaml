services:
  # Backend Service
  - type: web
    name: codememory-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 8000
      - key: MONGO_URI
        value: "mongodb+srv://username:password@cluster.mongodb.net/codeMemory"
        sync: false
      - key: NODE_ENV
        value: production
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # Frontend Service
  - type: web
    name: codememory-frontend
    env: static
    buildCommand: cd frontend/frontend && npm install && npm run build
    publishPath: frontend/frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codememory-backend
          property: url
