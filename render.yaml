services:
  # Backend Service
  - type: web
    name: codememory-backend
    env: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: PORT
        value: 8000
      - key: MONGO_URI
        fromDatabase:
          name: codememory-mongo
          property: connectionString
      - key: NODE_ENV
        value: production

  # Frontend Service
  - type: web
    name: codememory-frontend
    env: static
    buildCommand: cd frontend/frontend && npm install && npm run build
    publishPath: frontend/frontend/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: codememory-backend
          property: url

# MongoDB Database
databases:
  - name: codememory-mongo
    databaseName: codeMemory
    user: codememory
